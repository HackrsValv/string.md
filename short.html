<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>short.string.md</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --panel-bg: #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --text:     #e6edf3;
      --text-dim: #8b949e;
      --green:    #3fb950;
      --red:      #f85149;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 42px;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      cursor: pointer;
    }

    .peer-count {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ── Shared ── */
    .container {
      width: 100%;
      max-width: 640px;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }

    button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: rgba(255,255,255,0.07); border-color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    button.primary:hover:not(:disabled) { background: #79c0ff; }
    button.copy-btn { font-size: 0.78rem; padding: 4px 10px; }

    /* ── Create View ── */
    #create-view textarea {
      width: 100%;
      min-height: 80px;
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    #create-view textarea:focus { border-color: var(--accent); }
    #create-view textarea::placeholder { color: var(--text-dim); }

    .shorten-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.6rem;
    }

    /* ── Results ── */
    #results { margin-top: 1.5rem; display: none; }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 1rem;
    }

    .card-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-url {
      font-size: 0.92rem;
      color: var(--accent);
      word-break: break-all;
      cursor: pointer;
      text-decoration: none;
    }
    .card-url:hover { text-decoration: underline; }

    .card-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    /* ── Alias card ── */
    .alias-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .alias-row input {
      flex: 1;
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .alias-row input:focus { border-color: var(--accent); }
    .alias-row input::placeholder { color: var(--text-dim); }

    #alias-result { display: none; margin-top: 10px; }

    /* ── Resolve View ── */
    #resolve-view {
      display: none;
      text-align: center;
      padding-top: 4rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-size: 0.95rem;
      color: var(--text-dim);
    }

    .error-msg {
      color: var(--red);
      font-size: 0.9rem;
      margin-top: 0.8rem;
      display: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 1000;
    }
    #toast.show { opacity: 1; pointer-events: auto; }
  </style>

    <span class="logo" id="logo">short.string.md</span>

  <!-- Resolve View -->
  <div class="container" id="resolve-view">

  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Compression Engine -->
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script>
// ── Domain Dictionary ──
const DOMAIN_TO_CODE = {
  'google.com':         'G',
  'youtube.com':        'Y',
  'github.com':         'GH',
  'reddit.com':         'R',
  'twitter.com':        'TW',
  'x.com':              'X',
  'wikipedia.org':      'W',
  'en.wikipedia.org':   'WE',
  'amazon.com':         'AZ',
  'stackoverflow.com':  'SO',
  'linkedin.com':       'LI',
  'facebook.com':       'FB',
  'instagram.com':      'IG',
  'tiktok.com':         'TK',
  'twitch.tv':          'TV',
  'discord.com':        'DC',
  'discord.gg':         'DG',
  'notion.so':          'NO',
  'docs.google.com':    'GD',
  'drive.google.com':   'GR',
  'mail.google.com':    'GM',
  'maps.google.com':    'GP',
  'figma.com':          'FG',
  'medium.com':         'MD',
  'npmjs.com':          'NP',
  'string.md':          'SM',
  'short.string.md':    'SS',
};
const CODE_TO_DOMAIN = Object.fromEntries(
  Object.entries(DOMAIN_TO_CODE).map(([d, c]) => [c, d])
);

/**
 * Compress a URL string for embedding in a hash fragment.
 * Format: [S|H][domainCode|host]\t[pathname+search+hash]
 *   S = secure (https), H = http
 */
function compressURL(url) {
  let parsed;
  try { parsed = new URL(url); } catch { return null; }

  const secure = parsed.protocol === 'https:';
  const prefix = secure ? 'S' : 'H';
  const host = parsed.hostname + (parsed.port ? ':' + parsed.port : '');

  // Try longest match first (e.g. docs.google.com before google.com)
  let domainPart = null;
  const sortedDomains = Object.keys(DOMAIN_TO_CODE).sort((a, b) => b.length - a.length);
  for (const domain of sortedDomains) {
    if (host === domain || host === 'www.' + domain) {
      domainPart = DOMAIN_TO_CODE[domain];
      break;
    }
  }
  if (!domainPart) domainPart = host;

  const rest = parsed.pathname + parsed.search + parsed.hash;
  const raw = prefix + domainPart + '\t' + rest;
  return LZString.compressToEncodedURIComponent(raw);
}

/**
 * Decompress a hash fragment back into a full URL.
 */
function decompressURL(compressed) {
  let raw;
  try { raw = LZString.decompressFromEncodedURIComponent(compressed); } catch { return null; }
  if (!raw) return null;

  const prefix = raw[0]; // S or H
  if (prefix !== 'S' && prefix !== 'H') return null;

  const protocol = prefix === 'S' ? 'https://' : 'http://';
  const tabIdx = raw.indexOf('\t');
  if (tabIdx === -1) return null;

  const domainPart = raw.slice(1, tabIdx);
  const rest = raw.slice(tabIdx + 1);

  const host = CODE_TO_DOMAIN[domainPart] || domainPart;
  return protocol + host + rest;
}

window.compressURL = compressURL;
window.decompressURL = decompressURL;

// ── Constants ──
const ORIGIN = location.origin;

function makeCompressedURL(url) {
  return ORIGIN + '/#c/' + compressURL(url);
}

// ── DOM refs ──
const $createView    = document.getElementById('create-view');
const $resolveView   = document.getElementById('resolve-view');
const $resolveSpinner = document.getElementById('resolve-spinner');
const $resolveStatus = document.getElementById('resolve-status');
const $resolveError  = document.getElementById('resolve-error');
const $urlInput      = document.getElementById('url-input');
const $shortenBtn    = document.getElementById('shorten-btn');
const $results       = document.getElementById('results');
const $compressedUrl = document.getElementById('compressed-url');
const $compressedMeta = document.getElementById('compressed-meta');
const $aliasInput    = document.getElementById('alias-input');
const $aliasBtn      = document.getElementById('alias-btn');
const $aliasResult   = document.getElementById('alias-result');
const $aliasUrl      = document.getElementById('alias-url');
const $aliasMeta     = document.getElementById('alias-meta');
const $toast         = document.getElementById('toast');
const $logo          = document.getElementById('logo');

// ── Routing ──
function route() {
  const hash = location.hash || '';

  if (!hash || hash === '#') {
    // Show create view
    $createView.style.display = '';
    $resolveView.style.display = 'none';
    return;
  }

  if (hash.startsWith('#c/')) {
    const payload = hash.slice(3);
    const target = decompressURL(payload);
    if (!target) {
      showResolveError('Failed to decompress URL.');
      return;
    }
    window.location.replace(target);
    return;
  }

  if (hash.startsWith('#n/')) {
    const alias = hash.slice(3);
    $createView.style.display = 'none';
    $resolveView.style.display = '';
    resolveAlias(alias);
    return;
  }

  // Unknown hash
  showResolveError('Unknown link format.');
}

function showResolveError(msg) {
  $createView.style.display = 'none';
  $resolveView.style.display = '';
  $resolveSpinner.style.display = 'none';
  $resolveStatus.textContent = '';
  $resolveError.style.display = '';
  $resolveError.textContent = msg;
}

function resolveAlias(alias) {
  $resolveSpinner.style.display = '';
  $resolveStatus.textContent = 'Resolving alias...';
  $resolveError.style.display = 'none';

  // Placeholder -- real implementation will come with Trystero / KV
  setTimeout(() => {
    $resolveSpinner.style.display = 'none';
    $resolveStatus.textContent = '';
    $resolveError.style.display = '';
    $resolveError.textContent = 'Alias resolution is not yet implemented.';
  }, 600);
}

// ── Toast ──
let _toastTimer;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => $toast.classList.remove('show'), 2200);
}

// ── Init ──
function init() {
  route();

  // Enable shorten button when input has content
  $urlInput.addEventListener('input', () => {
    $shortenBtn.disabled = !$urlInput.value.trim();
  });

  // Shorten button click
  $shortenBtn.addEventListener('click', () => {
    let raw = $urlInput.value.trim();
    if (!raw) return;

    // Auto-add https:// if no protocol
    if (!/^https?:\/\//i.test(raw)) {
      raw = 'https://' + raw;
    }

    // Validate URL
    let parsed;
    try { parsed = new URL(raw); } catch {
      showToast('Invalid URL');
      return;
    }

    const compressed = compressURL(raw);
    if (!compressed) {
      showToast('Could not compress URL');
      return;
    }

    const shortURL = ORIGIN + '/#c/' + compressed;
    const originalLen = raw.length;
    const shortLen = shortURL.length;

    // Show results
    $results.style.display = '';

    $compressedUrl.textContent = shortURL;
    $compressedUrl.href = shortURL;
    $compressedMeta.textContent = `${originalLen} chars → ${shortLen} chars (${shortLen < originalLen ? '-' : '+'}${Math.abs(shortLen - originalLen)})`;

    // Reset alias card
    $aliasResult.style.display = 'none';
    $aliasInput.value = '';

    // Store for alias creation later
    window._pendingTarget = raw;
  });

  // Copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const targetId = btn.getAttribute('data-copy');
      const el = document.getElementById(targetId);
      if (!el) return;
      const text = el.textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied!');
      }).catch(() => {
        showToast('Copy failed');
      });
    });
  });

  // Click result URLs to open in new tab
  document.querySelectorAll('.card-url').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      window.open(link.href || link.textContent, '_blank', 'noopener');
    });
  });

  // Alias input sanitization — strip non [\w\-]
  $aliasInput.addEventListener('input', () => {
    const cleaned = $aliasInput.value.replace(/[^\w\-]/g, '');
    if (cleaned !== $aliasInput.value) $aliasInput.value = cleaned;
  });

  // Alias create button (placeholder)
  $aliasBtn.addEventListener('click', () => {
    showToast('Alias creation is not yet implemented.');
  });

  // Click logo / h1 to reset
  const resetToCreate = () => {
    location.hash = '';
    $createView.style.display = '';
    $resolveView.style.display = 'none';
    $results.style.display = 'none';
    $urlInput.value = '';
    $shortenBtn.disabled = true;
  };
  $logo.addEventListener('click', resetToCreate);
  document.querySelector('#create-view h1').addEventListener('click', resetToCreate);

  // Listen for hash changes
  window.addEventListener('hashchange', route);
}

window._initReady = init();
</script>
<script type="module">
// ── Nostr Alias Publishing & Resolution ──
import { generateSecretKey, getPublicKey, finalizeEvent } from 'https://esm.run/nostr-tools@2';

// ── Constants ──
const NOSTR_RELAYS = ['wss://relay.damus.io', 'wss://nos.lol', 'wss://relay.nostr.band'];
const NOSTR_KIND = 30078; // NIP-78 application-specific data
const APP_TAG = 'short.string.md';
const STORAGE_KEY_SK = 'short_stringmd_sk';
const STORAGE_KEY_CACHE = 'short_stringmd_cache';

// ── Key Management ──
function getOrCreateSecretKey() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY_SK);
    if (stored) {
      const arr = JSON.parse(stored);
      return new Uint8Array(arr);
    }
  } catch { /* generate fresh */ }
  const sk = generateSecretKey();
  localStorage.setItem(STORAGE_KEY_SK, JSON.stringify(Array.from(sk)));
  return sk;
}

const sk = getOrCreateSecretKey();
const pk = getPublicKey(sk);

// ── Alias Cache (localStorage) ──
function loadCache() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY_CACHE)) || {};
  } catch { return {}; }
}

function saveCache(cache) {
  localStorage.setItem(STORAGE_KEY_CACHE, JSON.stringify(cache));
}

function cacheAlias(alias, targetURL) {
  const cache = loadCache();
  cache[alias] = { url: targetURL, ts: Date.now() };
  saveCache(cache);
}

function lookupCache(alias) {
  const cache = loadCache();
  const entry = cache[alias];
  return entry ? entry.url : null;
}

// ── Nostr Relay Communication ──
function connectRelay(url) {
  return new Promise((resolve, reject) => {
    const ws = new WebSocket(url);
    const timer = setTimeout(() => {
      ws.close();
      reject(new Error('Timeout connecting to ' + url));
    }, 5000);
    ws.addEventListener('open', () => {
      clearTimeout(timer);
      resolve(ws);
    });
    ws.addEventListener('error', () => {
      clearTimeout(timer);
      reject(new Error('Error connecting to ' + url));
    });
  });
}

function publishToRelays(event) {
  return new Promise(async (resolve, reject) => {
    let successes = 0;
    let finished = 0;
    const total = NOSTR_RELAYS.length;

    for (const url of NOSTR_RELAYS) {
      try {
        const ws = await connectRelay(url);
        ws.send(JSON.stringify(['EVENT', event]));
        ws.addEventListener('message', (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data[0] === 'OK' && data[2] === true) successes++;
          } catch { /* ignore */ }
          finished++;
          if (finished === total) {
            ws.close();
            successes > 0 ? resolve(successes) : reject(new Error('No relay accepted the event'));
          }
        });
        // Close after 5s regardless
        setTimeout(() => { try { ws.close(); } catch {} }, 5000);
      } catch {
        finished++;
        if (finished === total) {
          successes > 0 ? resolve(successes) : reject(new Error('No relay accepted the event'));
        }
      }
    }
  });
}

function queryRelays(alias) {
  return new Promise((resolve) => {
    let resolved = false;
    const sockets = [];

    const timer = setTimeout(() => {
      if (!resolved) {
        resolved = true;
        sockets.forEach(ws => { try { ws.close(); } catch {} });
        resolve(null);
      }
    }, 6000);

    const filter = {
      kinds: [NOSTR_KIND],
      '#d': [alias],
      '#t': [APP_TAG],
      limit: 1,
    };

    let pending = NOSTR_RELAYS.length;

    for (const url of NOSTR_RELAYS) {
      connectRelay(url).then(ws => {
        sockets.push(ws);
        const subId = 'q_' + Math.random().toString(36).slice(2, 8);
        ws.send(JSON.stringify(['REQ', subId, filter]));
        ws.addEventListener('message', (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data[0] === 'EVENT' && data[2] && data[2].content && !resolved) {
              resolved = true;
              clearTimeout(timer);
              sockets.forEach(s => { try { s.close(); } catch {} });
              resolve(data[2].content);
            }
            if (data[0] === 'EOSE') {
              pending--;
              if (pending <= 0 && !resolved) {
                resolved = true;
                clearTimeout(timer);
                sockets.forEach(s => { try { s.close(); } catch {} });
                resolve(null);
              }
            }
          } catch { /* ignore */ }
        });
      }).catch(() => {
        pending--;
        if (pending <= 0 && !resolved) {
          resolved = true;
          clearTimeout(timer);
          sockets.forEach(s => { try { s.close(); } catch {} });
          resolve(null);
        }
      });
    }
  });
}

function createNostrAlias(alias, targetURL) {
  const event = finalizeEvent({
    kind: NOSTR_KIND,
    created_at: Math.floor(Date.now() / 1000),
    tags: [
      ['d', alias],
      ['t', APP_TAG],
    ],
    content: targetURL,
  }, sk);

  return publishToRelays(event).then(count => {
    cacheAlias(alias, targetURL);
    return count;
  });
}

// ── Short Code Generator ──
function genShortCode() {
  const bytes = crypto.getRandomValues(new Uint8Array(4));
  let num = 0;
  for (const b of bytes) num = num * 256 + b;
  return num.toString(36).slice(0, 6);
}

// ── Wait for init, then wire everything up ──
await window._initReady;

const $resolveSpinner = document.getElementById('resolve-spinner');
const $resolveStatus  = document.getElementById('resolve-status');
const $resolveError   = document.getElementById('resolve-error');
const $aliasInput     = document.getElementById('alias-input');
const $aliasBtn       = document.getElementById('alias-btn');
const $aliasUrl       = document.getElementById('alias-url');
const $aliasMeta      = document.getElementById('alias-meta');
const $aliasResult    = document.getElementById('alias-result');

// ── Override resolveAlias ──
window.resolveAlias = async function resolveAlias(alias) {
  $resolveSpinner.style.display = '';
  $resolveError.style.display = 'none';

  // Step 1: Check local cache
  $resolveStatus.textContent = 'Checking local cache...';
  const cached = lookupCache(alias);
  if (cached) {
    $resolveSpinner.style.display = 'none';
    $resolveStatus.textContent = 'Found in cache. Redirecting...';
    window.location.replace(cached);
    return;
  }

  // Step 2: P2P placeholder (Task 5)

  // Step 3: Query Nostr relays
  $resolveStatus.textContent = 'Querying Nostr relays...';
  const result = await queryRelays(alias);
  if (result) {
    cacheAlias(alias, result);
    $resolveSpinner.style.display = 'none';
    $resolveStatus.textContent = 'Found on relay. Redirecting...';
    window.location.replace(result);
    return;
  }

  // Step 4: Not found
  $resolveSpinner.style.display = 'none';
  $resolveStatus.textContent = '';
  $resolveError.style.display = '';

  // Build error message with link back to create view using safe DOM methods
  while ($resolveError.firstChild) $resolveError.removeChild($resolveError.firstChild);
  const errText = document.createTextNode('Alias not found. ');
  const errLink = document.createElement('a');
  errLink.href = '#';
  errLink.textContent = 'Create a new short link';
  errLink.style.color = 'var(--accent)';
  errLink.addEventListener('click', (e) => {
    e.preventDefault();
    location.hash = '';
  });
  $resolveError.appendChild(errText);
  $resolveError.appendChild(errLink);
};

// Also patch the route function's reference
const _origRoute = window.route || null;

// Override the global resolveAlias so the existing route() calls it
// The inline script's resolveAlias is in the same scope, so we override on window
// and also re-define in the original script's closure by re-assigning the function name
// The existing code calls resolveAlias(alias) directly — since it's a function declaration,
// we need to make the route function call our version.  We achieve this by overriding on window
// and patching the hashchange handler.

// Remove old hashchange listener and add new one that uses our resolveAlias
window.removeEventListener('hashchange', _origRoute);
window.addEventListener('hashchange', () => {
  const hash = location.hash || '';
  if (hash.startsWith('#n/')) {
    const alias = hash.slice(3);
    document.getElementById('create-view').style.display = 'none';
    document.getElementById('resolve-view').style.display = '';
    window.resolveAlias(alias);
  } else if (hash.startsWith('#c/')) {
    const payload = hash.slice(3);
    const target = window.decompressURL(payload);
    if (!target) {
      document.getElementById('create-view').style.display = 'none';
      document.getElementById('resolve-view').style.display = '';
      $resolveSpinner.style.display = 'none';
      $resolveStatus.textContent = '';
      $resolveError.style.display = '';
      $resolveError.textContent = 'Failed to decompress URL.';
      return;
    }
    window.location.replace(target);
  } else if (!hash || hash === '#') {
    document.getElementById('create-view').style.display = '';
    document.getElementById('resolve-view').style.display = 'none';
  } else {
    document.getElementById('create-view').style.display = 'none';
    document.getElementById('resolve-view').style.display = '';
    $resolveSpinner.style.display = 'none';
    $resolveStatus.textContent = '';
    $resolveError.style.display = '';
    $resolveError.textContent = 'Unknown link format.';
  }
});

// ── Wire alias creation button ──
// Replace the placeholder handler by cloning the button
const oldBtn = $aliasBtn;
const newBtn = oldBtn.cloneNode(true);
oldBtn.parentNode.replaceChild(newBtn, oldBtn);

newBtn.addEventListener('click', async () => {
  const target = window._pendingTarget;
  if (!target) {
    window.showToast ? window.showToast('No URL to alias. Shorten a URL first.') : alert('No URL to alias.');
    return;
  }

  let alias = $aliasInput.value.trim();
  if (!alias) alias = genShortCode();

  newBtn.disabled = true;
  newBtn.textContent = 'Publishing...';
  $aliasResult.style.display = 'none';

  try {
    // Check for collision
    const existing = await queryRelays(alias);
    if (existing) {
      newBtn.disabled = false;
      newBtn.textContent = 'Create';
      window.showToast ? window.showToast('Alias "' + alias + '" is already taken.') : alert('Alias taken.');
      return;
    }

    // Publish
    const count = await createNostrAlias(alias, target);
    const shortURL = location.origin + '/#n/' + alias;

    $aliasUrl.textContent = shortURL;
    $aliasUrl.href = shortURL;
    $aliasMeta.textContent = 'Published to ' + count + ' relay' + (count !== 1 ? 's' : '') + ' as "' + alias + '"';
    $aliasResult.style.display = '';

    // Update the copy button's data-copy target
    const copyBtn = $aliasResult.querySelector('.copy-btn');
    if (copyBtn) copyBtn.setAttribute('data-copy', 'alias-url');

    // Broadcast for future P2P integration
    if (typeof window._broadcastMapping === 'function') {
      window._broadcastMapping(alias, target);
    }
  } catch (err) {
    window.showToast ? window.showToast('Failed to publish alias: ' + err.message) : alert('Publish failed.');
  } finally {
    newBtn.disabled = false;
    newBtn.textContent = 'Create';
  }
});

// ── Re-trigger route if hash is #n/ ──
if (location.hash.startsWith('#n/')) {
  const alias = location.hash.slice(3);
  document.getElementById('create-view').style.display = 'none';
  document.getElementById('resolve-view').style.display = '';
  window.resolveAlias(alias);
}
</script>
</body>
</html>
